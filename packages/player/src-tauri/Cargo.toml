[package]
name = "amll-player"
version = "0.0.0"
description = "AMLL Player"
authors = ["you"]
license = ""
repository = ""
edition = "2024"

build = "build.rs"

[lib]
name = "amll_player_lib"
crate-type = ["staticlib", "cdylib", "lib"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
anyhow = "1.0"
anyhow-tauri = "1.0.0"
crossbeam-channel = "0.5.15"
futures = "0.3.28"
md5 = "0.8"
urlencoding = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "^1", features = [
	"rt-multi-thread",
	"macros",
	"process",
	"sync",
	"time",
] }
tokio-tungstenite = "0.29"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

tauri = { version = "2", features = ["devtools"] }
tauri-plugin-dialog = { version = "2" }
tauri-plugin-fs = { version = "2" }
tauri-plugin-opener = { version = "2" }
tauri-plugin-os = { version = "2" }
tauri-plugin-shell = { version = "2" }

amll-player-core = { path = "../../player-core" }
ws-protocol = { path = "../../ws-protocol", features = ["tracing"] }
tauri-plugin-http = "2"
rodio = "0.22"

rkyv = { version = "0.7", features = ["validation"] }
memmap2 = "0.9"
reqwest = { version = "0.13", features = ["json", "stream"] }
zip = "8.6"
ttml_processor = "0.3"
tempfile = "3.27"
mimalloc = "0.1.50"

[dependencies.ffmpeg-next]
version = "8"
default-features = false

[target.'cfg(target_os = "android")'.dependencies]
ndk-context = "0.1.1"
jni = "0.21"
# Used in sync.rs to build a reqwest client with WebPKI roots on Android,
# bypassing rustls-platform-verifier which requires JNI_OnLoad (not called by Tauri).
rustls = { version = "0.23", default-features = false, features = ["ring"] }
webpki-roots = "0.26"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "^0.6"
objc2-avf-audio = "^0.3"
tauri-plugin-macos-fps = "0.1.0"

[target.'cfg(target_os = "windows")'.dependencies]
webview2-com = "0.38"
taskbar-lyric = { git = "https://github.com/apoint123/taskbar-lyric.git", features = [
	"tracing",
] }
windows = { version = "0.62", features = [
	"Win32_Foundation",
	"Win32_UI_WindowsAndMessaging",
	"Win32_Graphics",
	"Win32_Graphics_Gdi",
	"Win32_UI_Controls",
	"Win32_UI_Shell",
	"Win32_System_Registry",
	"Win32_System_Threading",
] }

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-global-shortcut = { version = "2" }
tauri-plugin-updater = { version = "2" }

[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
